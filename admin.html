<!-- =========================
CLIENT FORM (UPDATED)
========================= -->
<section class="card" id="clientFormCard">

  <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;">
    <h2 style="margin:0;">Add / Update Client</h2>
    <div style="display:flex;gap:10px;">
      <button class="primary" onclick="toggleClientForm()">Open Form</button>
      <button class="secondary" onclick="closeClientForm()">Close</button>
    </div>
  </div>

  <div id="clientFormWrap" style="display:none;margin-top:18px;">

    <div class="notice">
      Billing Override keeps a site active even if Stripe/subscriptions are not active.
    </div>

    <div class="form-grid">

      <!-- EXISTING FIELDS ABOVE THIS LINE -->

      <div class="full">
        <label>Client Tags</label>
        <input id="clientTags" placeholder="VIP, fast pay, high maintenance">
      </div>

      <div>
        <label>Editor Lock</label>
        <select id="editorLocked">
          <option value="false">Unlocked</option>
          <option value="true">Locked (No Access)</option>
        </select>
      </div>

      <div>
        <label>Lock Reason</label>
        <input id="editorLockedReason" placeholder="Non-payment, safety, etc.">
      </div>

      <!-- EXISTING FIELDS BELOW -->
    </div>

    <button class="primary" style="margin-top:16px;" onclick="saveClientSite()">Save Client Site</button>
    <button class="secondary" style="margin-top:16px;" onclick="clearClientForm()">Clear</button>

    <div id="message"></div>
  </div>
</section>
