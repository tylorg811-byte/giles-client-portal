<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Giles Web Design</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Inter,Arial,sans-serif;
background:#f6f7fb;
color:#111827;
}

.admin-shell{
min-height:100vh;
display:grid;
grid-template-columns:280px 1fr;
}

.sidebar{
background:#07111f;
color:white;
padding:28px;
}

.logo{
width:48px;
height:48px;
border-radius:14px;
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:22px;
margin-bottom:20px;
}

.sidebar h2{
font-size:22px;
margin-bottom:8px;
}

.sidebar p{
color:#b8c2d8;
font-size:14px;
line-height:1.5;
margin-bottom:26px;
}

.sidebar a,
.sidebar button{
display:block;
width:100%;
border:none;
background:rgba(255,255,255,.08);
color:white;
text-decoration:none;
padding:13px 14px;
border-radius:14px;
font-weight:800;
margin-bottom:10px;
cursor:pointer;
text-align:left;
}

.sidebar a:hover,
.sidebar button:hover{
background:#7B5CFF;
}

.main{
padding:34px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:26px;
}

.top h1{
font-size:34px;
letter-spacing:-1px;
}

.top p{
color:#667085;
margin-top:6px;
}

.primary{
border:none;
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
color:white;
font-weight:900;
padding:13px 20px;
border-radius:14px;
cursor:pointer;
box-shadow:0 12px 28px rgba(123,92,255,.25);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin-bottom:22px;
}

.stat{
background:white;
border:1px solid #e6e6ef;
border-radius:22px;
padding:22px;
box-shadow:0 12px 35px rgba(20,20,40,.06);
}

.stat span{
display:block;
font-size:13px;
font-weight:800;
color:#667085;
margin-bottom:10px;
}

.stat strong{
font-size:30px;
}

.card{
background:white;
border:1px solid #e6e6ef;
border-radius:24px;
padding:24px;
box-shadow:0 12px 35px rgba(20,20,40,.06);
margin-bottom:22px;
}

.card h2{
font-size:22px;
margin-bottom:18px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

label{
display:block;
font-size:13px;
font-weight:900;
margin-bottom:7px;
color:#333;
}

input,
select,
textarea{
width:100%;
padding:13px 14px;
border-radius:14px;
border:1px solid #dfe3ee;
background:#f9fafc;
font-size:14px;
outline:none;
}

textarea{
min-height:100px;
resize:vertical;
}

.full{
grid-column:1 / -1;
}

.client-list{
display:flex;
flex-direction:column;
gap:14px;
}

.client-card{
background:#fff;
border:1px solid #e6e6ef;
border-radius:20px;
padding:18px;
display:grid;
grid-template-columns:1.4fr 1fr 1fr auto;
gap:14px;
align-items:center;
box-shadow:0 8px 24px rgba(20,20,40,.05);
}

.client-card h3{
font-size:18px;
margin-bottom:5px;
}

.client-card p{
font-size:13px;
color:#667085;
line-height:1.45;
}

.badge{
display:inline-block;
padding:7px 10px;
border-radius:999px;
font-size:12px;
font-weight:900;
background:#f3f2ff;
color:#5a4cff;
text-transform:capitalize;
}

.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:flex-end;
}

.actions button,
.actions a{
border:none;
background:#f4f4fb;
color:#303445;
padding:9px 11px;
border-radius:12px;
font-size:12px;
font-weight:900;
cursor:pointer;
text-decoration:none;
}

.actions button:hover,
.actions a:hover{
background:#7B5CFF;
color:white;
}

.danger:hover{
background:#d11a2a!important;
}

#message{
font-size:13px;
font-weight:800;
margin-top:12px;
color:#5a4cff;
}

@media(max-width:1000px){
.admin-shell{display:block;}
.grid{grid-template-columns:1fr 1fr;}
.client-card{grid-template-columns:1fr;}
.actions{justify-content:flex-start;}
}

@media(max-width:700px){
.main{padding:20px;}
.grid,.form-grid{grid-template-columns:1fr;}
.top{display:block;}
.primary{margin-top:16px;}
}
</style>
</head>

<body>

<div class="admin-shell">

  <aside class="sidebar">
    <div class="logo">G</div>
    <h2>Admin Panel</h2>
    <p>Manage clients, websites, domains, and portal access.</p>

    <a href="dashboard.html">Client Dashboard</a>
    <a href="editor.html">Open Editor</a>
    <a href="login.html">Login Page</a>
    <button onclick="logout()">Logout</button>
  </aside>

  <main class="main">

    <div class="top">
      <div>
        <h1>Client Websites</h1>
        <p id="adminEmail">Loading...</p>
      </div>

      <button class="primary" onclick="scrollToForm()">+ Add Client Site</button>
    </div>

    <section class="grid">
      <div class="stat">
        <span>Total Clients</span>
        <strong id="totalClients">0</strong>
      </div>

      <div class="stat">
        <span>Published</span>
        <strong id="publishedClients">0</strong>
      </div>

      <div class="stat">
        <span>Domains Live</span>
        <strong id="liveDomains">0</strong>
      </div>

      <div class="stat">
        <span>Pending Domains</span>
        <strong id="pendingDomains">0</strong>
      </div>
    </section>

    <section class="card" id="clientFormCard">
      <h2>Add / Update Client</h2>

      <div class="form-grid">
        <input type="hidden" id="clientRecordId">

        <div>
          <label>Business Name</label>
          <input id="businessName" placeholder="Greenscape Landscaping">
        </div>

        <div>
          <label>Client Email</label>
          <input id="clientEmail" placeholder="client@email.com">
        </div>

        <div>
          <label>Client Supabase User ID</label>
          <input id="clientUserId" placeholder="Paste client UUID here">
        </div>

        <div>
          <label>Package</label>
          <select id="packageName">
            <option value="Starter">Starter</option>
            <option value="Standard">Standard</option>
            <option value="Premium">Premium</option>
            <option value="Maintenance">Maintenance</option>
          </select>
        </div>

        <div>
          <label>Domain</label>
          <input id="domain" placeholder="clientdomain.com">
        </div>

        <div>
          <label>Domain Status</label>
          <select id="domainStatus">
            <option value="not connected">Not Connected</option>
            <option value="pending">Pending</option>
            <option value="live">Live</option>
          </select>
        </div>

        <div>
          <label>Site Status</label>
          <select id="siteStatus">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
            <option value="needs review">Needs Review</option>
          </select>
        </div>

        <div class="full">
          <label>Notes</label>
          <textarea id="notes" placeholder="Domain info, client requests, package notes, etc."></textarea>
        </div>
      </div>

      <button class="primary" style="margin-top:16px;" onclick="saveClientSite()">Save Client Site</button>
      <button class="actions-reset" style="margin-top:16px;border:none;background:#f4f4fb;padding:13px 16px;border-radius:14px;font-weight:900;cursor:pointer;" onclick="clearClientForm()">Clear</button>

      <div id="message"></div>
    </section>

    <section class="card">
      <h2>All Client Sites</h2>
      <div id="clientList" class="client-list">
        Loading clients...
      </div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="admin.js"></script>

</body>
</html>
