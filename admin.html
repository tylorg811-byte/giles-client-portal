<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Inter,Arial,sans-serif;
background:#f5f6fb;
color:#0f172a;
display:flex;
min-height:100vh;
}

.sidebar{
width:300px;
background:#07111f;
color:white;
padding:28px 20px;
display:flex;
flex-direction:column;
gap:14px;
min-height:100vh;
position:sticky;
top:0;
overflow-y:auto;
}

.sidebar h2{
font-size:28px;
margin-bottom:18px;
}

.sidebar button,
.sidebar a{
background:#152335;
border:none;
color:white;
padding:16px 18px;
border-radius:14px;
cursor:pointer;
text-decoration:none;
text-align:left;
font-weight:900;
font-size:16px;
transition:.2s ease;
}

.sidebar button:hover,
.sidebar a:hover{
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
transform:translateX(3px);
}

.main{
flex:1;
padding:32px;
}

h1{
font-size:38px;
letter-spacing:-1px;
}

.card{
background:white;
border:1px solid #e6e8f0;
border-radius:24px;
padding:24px;
margin-bottom:22px;
box-shadow:0 12px 35px rgba(15,23,42,.06);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
margin:24px 0;
}

.stat{
background:white;
padding:22px;
border-radius:22px;
border:1px solid #e6e8f0;
box-shadow:0 12px 35px rgba(15,23,42,.05);
}

.stat b,
.stat span{
display:block;
font-size:14px;
font-weight:900;
color:#64748b;
margin-bottom:10px;
}

.stat div,
.stat strong{
display:block;
font-size:34px;
font-weight:900;
color:#07111f;
line-height:1;
}

.client-card{
background:white;
border:1px solid #e6e8f0;
border-radius:22px;
padding:22px;
margin-bottom:16px;
display:grid;
grid-template-columns:1.3fr .7fr .7fr 1.8fr;
gap:20px;
align-items:start;
box-shadow:0 10px 28px rgba(15,23,42,.05);
}

.client-card h3{
font-size:22px;
margin-bottom:6px;
}

.client-card p{
font-size:14px;
color:#64748b;
line-height:1.45;
margin-bottom:5px;
}

.actions{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.actions button,
.actions a,
button,
.primary,
.secondary{
border:none;
background:#f1f3f8;
color:#111827;
padding:12px 14px;
border-radius:13px;
font-size:13px;
font-weight:900;
cursor:pointer;
text-decoration:none;
text-align:center;
transition:.18s ease;
}

.actions button:hover,
.actions a:hover,
button:hover{
background:#7B5CFF;
color:white;
}

.danger,
.actions .danger{
background:#fee2e2!important;
color:#991b1b!important;
}

.danger:hover,
.actions .danger:hover{
background:#dc2626!important;
color:white!important;
}

.release-btn{
grid-column:span 2;
background:#fff1f2!important;
color:#b91c1c!important;
}

input,select,textarea{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #dce1ec;
background:#fbfcff;
font-size:15px;
outline:none;
}

input:focus,
select:focus,
textarea:focus{
border-color:#7B5CFF;
box-shadow:0 0 0 4px rgba(123,92,255,.12);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:18px;
}

textarea{min-height:100px;}
.full{grid-column:1 / -1;}

.page-section{display:none;}
.page-section.active{display:block;}

#smartAlerts{
font-size:18px;
font-weight:900;
}

.badge{
display:inline-block;
padding:7px 10px;
border-radius:999px;
font-size:12px;
font-weight:900;
background:#f3f2ff;
color:#5a4cff;
margin:2px 4px 2px 0;
}

.badge.full{background:#ecfdf3;color:#027a48;}
.badge.safe{background:#fff7ed;color:#c2410c;}
.badge.danger{background:#fee2e2;color:#b91c1c;}
.badge.dark{background:#111827;color:white;}

.empty-state{
background:#f8fafc;
border:1px dashed #d9deea;
border-radius:18px;
padding:24px;
text-align:center;
color:#64748b;
font-weight:900;
}

@media(max-width:1100px){
body{display:block;}
.sidebar{width:100%;min-height:auto;position:relative;}
.grid{grid-template-columns:1fr 1fr;}
.client-card{grid-template-columns:1fr;}
.actions{grid-template-columns:1fr 1fr;}
}

@media(max-width:700px){
.main{padding:18px;}
.grid,.form-grid{grid-template-columns:1fr;}
.actions{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin Panel</h2>

  <button onclick="showAdminPage('clients')">Clients</button>
  <button onclick="showAdminPage('analytics')">Analytics</button>
  <button onclick="showAdminPage('requests')">Requests</button>
  <button onclick="showAdminPage('billing')">Billing</button>

  <a href="dashboard.html">Client Dashboard</a>
  <a href="editor.html">Editor</a>
  <a href="login.html">Login</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1 id="pageTitle">Client Websites</h1>
  <p id="adminEmail"></p>

  <!-- SMART ALERTS -->
  <div id="smartAlerts" class="card"></div>

  <!-- STATS -->
  <div class="grid">
    <div class="stat"><b>Total Clients</b><div id="totalClients">0</div></div>
    <div class="stat"><b>Published</b><div id="publishedClients">0</div></div>
    <div class="stat"><b>Past Due</b><div id="pastDueClients">0</div></div>
    <div class="stat"><b>Requests</b><div id="newRequests">0</div></div>
  </div>

  <!-- CLIENT PAGE -->
  <div id="clientsPage" class="page-section active">

    <!-- FORM -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;">
        <h2>Add / Update Client</h2>
        <div>
          <button onclick="toggleClientForm()">Open Form</button>
          <button onclick="closeClientForm()">Close</button>
        </div>
      </div>

      <div id="clientFormWrap" style="display:none;margin-top:16px;">

        <div class="form-grid">

          <input type="hidden" id="clientRecordId">

          <input id="businessName" placeholder="Business Name">
          <input id="clientEmail" placeholder="Client Email">

          <input id="clientUserId" placeholder="Client User ID">
          <input id="packageName" placeholder="Package">

          <input id="domain" placeholder="Domain">
          <input id="domainStatus" placeholder="Domain Status">

          <input id="siteStatus" placeholder="Site Status">
          <select id="editorAccess">
  <option value="safe">Safe Mode</option>
  <option value="full">Full Editor Access</option>
</select>

         <select id="billingStatus">
  <option value="active">Active / Paid</option>
  <option value="manual paid">Manual Payment Received</option>
  <option value="free">Free / Family / Comped</option>
  <option value="trial">Trial</option>
  <option value="past due">Past Due</option>
  <option value="paused">Paused</option>
</select>
         <select id="billingOverride">
  <option value="false">No Override</option>
  <option value="true">Override Enabled</option>
</select>

          <input id="billingCycle" placeholder="Billing Cycle">
          <input id="nextPaymentDate" placeholder="Next Payment Date">

          <input id="lastPaymentDate" placeholder="Last Payment Date">
          <input id="clientTags" placeholder="Client Tags">

          <select id="editorLocked">
            <option value="false">Unlocked</option>
            <option value="true">Locked</option>
          </select>

          <input id="editorLockedReason" placeholder="Lock Reason">

          <textarea id="notes" class="full" placeholder="Notes"></textarea>

        </div>

        <button onclick="saveClientSite()">Save</button>
        <button onclick="clearClientForm()">Clear</button>

        <div id="message"></div>

      </div>
    </div>

    <!-- CLIENT LIST -->
    <div class="card">
      <h2>Clients</h2>
      <input id="clientSearch" placeholder="Search..." oninput="applyClientFilters()">
      <div id="clientList">Loading...</div>
    </div>

  </div>

  <!-- ANALYTICS -->
  <div id="analyticsPage" class="page-section">
    <div class="card">
      <h2>Analytics</h2>
      <div id="analyticsOverview"></div>

      <select id="analyticsClientSelect" onchange="loadClientAnalyticsView()"></select>
      <div id="analyticsClientView"></div>
    </div>
  </div>

  <!-- REQUESTS -->
  <div id="requestsPage" class="page-section">
    <div class="card">
      <h2>Change Requests</h2>
      <div id="changeRequestList">Loading...</div>
    </div>
  </div>

  <!-- BILLING -->
  <div id="billingPage" class="page-section">
    <div class="card">
      <h2>Billing</h2>
      <div id="billingOverview"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="admin.js"></script>
<script src="admin-importer.js"></script>

</body>
</html>
