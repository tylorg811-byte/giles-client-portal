<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Giles Web Design</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#0a0f1c;
  color:#111827;
  display:grid;
  grid-template-columns:260px 1fr;
}

/* SIDEBAR */
.sidebar{
  background:linear-gradient(180deg,#0b0f1a,#121a2b);
  color:white;
  height:100vh;
  padding:24px;
  position:sticky;
  top:0;
  border-right:1px solid rgba(255,255,255,0.05);
}

.logo{
  font-size:28px;
  font-weight:900;
  margin-bottom:20px;
  background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#182033;
  color:#cbd5e1;
  cursor:pointer;
  font-weight:600;
  transition:.2s;
}

.sidebar button:hover,
.sidebar .active-nav{
  background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
  color:white;
}

/* MAIN */
.main{
  padding:28px;
  background:#f5f7fb;
}

/* TOP */
.top h1{
  font-size:34px;
  font-weight:800;
}
.top p{
  color:#64748b;
}

/* STATS */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin:20px 0;
}

.stat{
  background:white;
  padding:20px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.stat b{
  font-size:14px;
  color:#64748b;
}
.stat div{
  font-size:32px;
  font-weight:800;
}

/* CARDS */
.card{
  background:white;
  border-radius:20px;
  padding:22px;
  margin-bottom:20px;
  box-shadow:0 12px 30px rgba(0,0,0,0.06);
}

/* BUTTONS */
.primary{
  background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
  color:white;
  border:none;
  padding:12px 16px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
}

.secondary{
  background:#eef1f7;
  border:none;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
}

/* CLIENT CARDS */
.client-card{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:16px;
  padding:18px;
  border-radius:18px;
  border:1px solid #e6e9f2;
  background:white;
  margin-bottom:14px;
}

.client-card h3{
  font-size:20px;
  margin-bottom:6px;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.actions button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#f1f3f8;
  cursor:pointer;
  font-weight:600;
}

.actions button:hover{
  background:#7B5CFF;
  color:white;
}

/* SEO PANEL */
.seo-preview{
  border:1px solid #e5e7eb;
  padding:16px;
  border-radius:14px;
}

.seo-preview .title{
  color:#1a0dab;
  font-weight:600;
}

.seo-preview .desc{
  color:#4b5563;
  font-size:14px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Giles</div>

  <button class="active-nav" onclick="showAdminPage('clients')">Clients</button>
  <button onclick="showAdminPage('seo')">SEO Panel</button>
  <button onclick="showAdminPage('analytics')">Analytics</button>
  <button onclick="showAdminPage('requests')">Requests</button>
  <button onclick="showAdminPage('billing')">Billing</button>

  <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="top">
    <h1 id="pageTitle">Dashboard</h1>
    <p id="adminEmail"></p>
  </div>

  <!-- STATS -->
  <div class="grid">
    <div class="stat"><b>Total Clients</b><div id="totalClients">0</div></div>
    <div class="stat"><b>Published</b><div id="publishedClients">0</div></div>
    <div class="stat"><b>Past Due</b><div id="pastDueClients">0</div></div>
    <div class="stat"><b>Requests</b><div id="newRequests">0</div></div>
  </div>

  <!-- CLIENTS -->
  <section id="clientsPage" class="card">
    <h2>Clients</h2>
    <div id="clientList">Loading...</div>
  </section>

  <!-- SEO -->
  <section id="seoPage" class="card" style="display:none;">
    <h2>SEO Panel</h2>

    <select id="seoClientSelect"></select>

    <input id="seoTitle" placeholder="SEO Title">
    <textarea id="seoDescription" placeholder="SEO Description"></textarea>
    <input id="seoKeywords" placeholder="Keywords">

    <button class="primary" onclick="autoGenerateSEO()">Auto Generate</button>
    <button class="secondary" onclick="saveSEO()">Save</button>

    <div class="seo-preview">
      <div class="title" id="seoPreviewTitle">Preview Title</div>
      <div class="desc" id="seoPreviewDesc">Preview Description</div>
    </div>
  </section>

  <!-- ANALYTICS -->
  <section id="analyticsPage" class="card" style="display:none;">
    <h2>Analytics</h2>
    <div id="analyticsOverview"></div>
  </section>

  <!-- REQUESTS -->
  <section id="requestsPage" class="card" style="display:none;">
    <h2>Requests</h2>
    <div id="changeRequestList"></div>
  </section>

  <!-- BILLING -->
  <section id="billingPage" class="card" style="display:none;">
    <h2>Billing</h2>
    <div id="billingOverview"></div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="admin.js"></script>

</body>
</html>
