<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Website</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#fff;}
#loading{display:flex;align-items:center;justify-content:center;height:100vh;font-size:18px;color:#666;}
#site{display:none;}
</style>
</head>

<body>

<div id="loading">Loading website...</div>
<div id="site"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://ujxuirmeikbzakqaerec.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_gLnNGeQUUbjLoQlN5g2t9g_XXQpy9P3";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const userId = "REPLACE_THIS_WITH_CLIENT_ID";

async function loadSite(){
  const params = new URLSearchParams(window.location.search);
  const pageName = params.get("page") || "home";

  const { data, error } = await db
    .from("visual_pages")
    .select("*")
    .eq("user_id", userId)
    .eq("status", "published")
    .single();

  if(error || !data){
    document.getElementById("loading").innerText = "No website published yet.";
    return;
  }

  let page = null;

  if(data.pages && data.pages[pageName]){
    page = data.pages[pageName];
  } else if(data.pages && data.pages.home){
    page = data.pages.home;
  } else {
    page = {
      html:data.html || "",
      css:data.css || ""
    };
  }

  document.getElementById("site").innerHTML = page.html;

  const style = document.createElement("style");
  style.innerHTML = page.css || data.css || "";
  document.head.appendChild(style);

  document.getElementById("loading").style.display = "none";
  document.getElementById("site").style.display = "block";
}

loadSite();
</script>

</body>
</html>
