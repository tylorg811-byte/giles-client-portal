<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Portal | Giles Web Design</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
background:#0B0B0F;
color:white;
font-family:Arial,sans-serif;
}

.portal-bg{
position:fixed;
inset:0;
background:linear-gradient(120deg,#0B0B0F,#1a1a40,#2a1a55,#0B0B0F);
background-size:300% 300%;
animation:bgMove 12s ease infinite;
z-index:-1;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-card{
width:90%;
max-width:420px;
padding:35px;
border-radius:22px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(16px);
box-shadow:0 20px 60px rgba(0,0,0,.35);
text-align:center;
}

.login-card h1{
font-size:30px;
margin-bottom:10px;
}

.login-card p{
color:#aaa;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
background:#111;
color:white;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#7B5CFF,#9F7BFF);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

#message{
margin-top:15px;
color:#ccc;
font-size:14px;
}
</style>
</head>

<body>

<div class="portal-bg"></div>

<div class="login-card">
  <h1>Giles Client Portal</h1>
  <p>Log in to edit your website</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="message"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
