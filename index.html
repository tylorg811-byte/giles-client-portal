<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Website</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#fff;
}

#loading{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-size:18px;
color:#667085;
}

#site{
display:none;
}

.error-box{
max-width:620px;
margin:80px auto;
padding:30px;
border-radius:24px;
background:#f8fafc;
border:1px solid #e6e6ef;
text-align:center;
}

.error-box h1{
margin-bottom:12px;
}
</style>
</head>

<body>

<div id="loading">Loading website...</div>
<div id="site"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://ujxuirmeikbzakqaerec.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_gLnNGeQUUbjLoQlN5g2t9g_XXQpy9P3";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let loadedClientId = null;
let loadedPageName = "home";

async function loadSite(){
  const params = new URLSearchParams(window.location.search);

  const clientId = params.get("client");
  const pageName = params.get("page") || "home";
  const host = window.location.hostname;

  loadedPageName = pageName;

  let query = db
    .from("visual_pages")
    .select("*")
    .eq("status", "published");

  if(clientId){
    loadedClientId = clientId;
    query = query.eq("user_id", clientId);
  } else {
    const { data: siteRecord } = await db
      .from("client_sites")
      .select("*")
      .eq("domain", host)
      .neq("domain_release_status", "released")
      .single();

    if(siteRecord && siteRecord.client_user_id){
      loadedClientId = siteRecord.client_user_id;
      query = query.eq("user_id", siteRecord.client_user_id);
    } else {
      showError("No client website selected.", "Use a live link with ?client=CLIENT_ID or connect a custom domain.");
      return;
    }
  }

  const { data, error } = await query.single();

  if(error || !data){
    showError("No website published yet.", "Publish this client’s website from the editor first.");
    return;
  }

  let page = null;

  if(data.pages && data.pages[pageName]){
    page = data.pages[pageName];
  } else if(data.pages && data.pages.home){
    page = data.pages.home;
  } else {
    page = {
      html:data.html || "",
      css:data.css || ""
    };
  }

  const seo = data.site_settings || {};

document.title =
  data.seo_title ||
  seo.businessName ||
  "Website";

const metaDesc = document.createElement("meta");
metaDesc.name = "description";
metaDesc.content = data.seo_description || "";
document.head.appendChild(metaDesc);

const metaKeywords = document.createElement("meta");
metaKeywords.name = "keywords";
metaKeywords.content = data.seo_keywords || "";
document.head.appendChild(metaKeywords);

  const schema = document.createElement("script");
schema.type = "application/ld+json";
schema.innerHTML = JSON.stringify({
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": data.site_settings?.businessName || "",
  "url": window.location.href
});
  
document.head.appendChild(schema);
  const style = document.createElement("style");
  style.innerHTML = page.css || data.css || "";
  document.head.appendChild(style);

  document.getElementById("site").innerHTML = page.html;

  fixInternalLinks(loadedClientId);

  document.getElementById("loading").style.display = "none";
  document.getElementById("site").style.display = "block";

  trackPageView();
}

function fixInternalLinks(clientId){
  const links = document.querySelectorAll("#site a[href^='?page=']");

  links.forEach(link=>{
    const url = new URL(link.href);
    const page = url.searchParams.get("page") || "home";

    if(clientId){
      link.href = `index.html?client=${clientId}&page=${page}`;
    } else {
      link.href = `?page=${page}`;
    }
  });
}

async function trackPageView(){
  if(!loadedClientId) return;

  const device = getDeviceType();
  const browser = getBrowser();

  await db.from("site_analytics_events").insert({
    client_user_id: loadedClientId,
    page: loadedPageName,
    path: window.location.pathname + window.location.search,
    referrer: document.referrer || "direct",
    device: device,
    browser: browser
  });
}

function getDeviceType(){
  const width = window.innerWidth;
  const ua = navigator.userAgent.toLowerCase();

  if(/iphone|android.*mobile|windows phone/.test(ua)) return "mobile";
  if(/ipad|tablet|android(?!.*mobile)/.test(ua)) return "tablet";
  if(width <= 700) return "mobile";
  if(width <= 1100) return "tablet";
  return "desktop";
}

function getBrowser(){
  const ua = navigator.userAgent;

  if(ua.includes("Edg")) return "Edge";
  if(ua.includes("Chrome")) return "Chrome";
  if(ua.includes("Safari") && !ua.includes("Chrome")) return "Safari";
  if(ua.includes("Firefox")) return "Firefox";
  return "Other";
}

function showError(title,message){
  document.getElementById("loading").style.display = "none";
  document.getElementById("site").style.display = "block";
  document.getElementById("site").innerHTML = `
    <div class="error-box">
      <h1>${title}</h1>
      <p>${message}</p>
    </div>
  `;
}

loadSite();
</script>

</body>
</html>
