<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Website</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#fff;
}

#loading{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-size:18px;
color:#666;
}

#site{
display:none;
}
</style>

</head>

<body>

<div id="loading">Loading website...</div>
<div id="site"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// =========================
// 🔑 YOUR SUPABASE INFO
// =========================
const SUPABASE_URL = "https://ujxuirmeikbzakqaerec.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_gLnNGeQUUbjLoQlN5g2t9g_XXQpy9P3";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =========================
// 🔥 IMPORTANT: SET USER ID
// =========================

// 👉 CHANGE THIS PER CLIENT
const userId = "979da64c-e710-4632-8056-c8e81c46ff21";

// =========================
// LOAD SITE
// =========================
async function loadSite(){

  const { data, error } = await db
    .from("visual_pages")
    .select("*")
    .eq("user_id", userId)
    .eq("status", "published")
    .single();

  if(error || !data){
    document.getElementById("loading").innerText = "No website published yet.";
    return;
  }

  // Inject HTML
  document.getElementById("site").innerHTML = data.html;

  // Inject CSS
  const style = document.createElement("style");
  style.innerHTML = data.css || "";
  document.head.appendChild(style);

  // Show site
  document.getElementById("loading").style.display = "none";
  document.getElementById("site").style.display = "block";
}

loadSite();
</script>

</body>
</html>
