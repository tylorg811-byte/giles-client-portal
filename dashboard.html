<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#f3f6fb;
  --dark:#07111f;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e2e8f0;
  --purple:#7B5CFF;
  --purple2:#A78BFA;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#f97316;
  --shadow:0 18px 45px rgba(15,23,42,.08);
}

body{
  font-family:'Inter',Arial,sans-serif;
  background:radial-gradient(circle at top left,rgba(123,92,255,.14),transparent 30%),var(--bg);
  color:var(--text);
  min-height:100vh;
}

.app{
  min-height:100vh;
  display:grid;
  grid-template-columns:285px 1fr;
}

.sidebar{
  background:linear-gradient(180deg,#07111f,#101827);
  color:white;
  padding:24px;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
}

.brand{
  display:flex;
  gap:14px;
  align-items:center;
  margin-bottom:22px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:18px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:23px;
}

.brand h2{font-size:20px;line-height:1.05;}

.sidebar p{
  color:#cbd5e1;
  font-size:14px;
  line-height:1.5;
  margin-bottom:22px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav button,.nav a{
  width:100%;
  border:none;
  background:rgba(255,255,255,.06);
  color:#e5e7eb;
  text-decoration:none;
  padding:14px 15px;
  border-radius:16px;
  font-weight:900;
  text-align:left;
  cursor:pointer;
}

.nav button:hover,.nav button.active,.nav a:hover{
  background:linear-gradient(135deg,var(--purple),var(--purple2));
}
