<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#070A12;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0F172A;
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:18px;
  margin-bottom:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

h1{font-size:26px;}
p{color:#94A3B8;}

button{
  border:none;
  padding:10px 14px;
  border-radius:12px;
  background:#8B5CF6;
  color:white;
  font-weight:700;
  cursor:pointer;
}

.tabs{
  display:flex;
  gap:8px;
  margin:16px 0;
}

.tabs button{
  background:#1E293B;
}

.tabs button.active{
  background:#8B5CF6;
}

.page{display:none;}
.page.active{display:block;}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
  background:#020617;
  color:white;
}

.list{margin-top:10px;}
.item{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

  <body>

<div class="container">

<h1 id="welcomeTitle">Dashboard</h1>
<p id="welcomeSubtitle">Loading...</p>

<div class="grid">
  <div class="card"><span>Views</span><h2 id="sumViewsMonth">0</h2></div>
  <div class="card"><span>Leads</span><h2 id="sumLeadsMonth">0</h2></div>
  <div class="card"><span>Requests</span><h2 id="sumOpenRequests">0</h2></div>
  <div class="card"><span>Tickets</span><h2 id="sumOpenTickets">0</h2></div>
</div>

<div class="tabs">
  <button class="active" onclick="showPage('overview',this)">Overview</button>
  <button onclick="showPage('analytics',this)">Analytics</button>
  <button onclick="showPage('requests',this)">Requests</button>
  <button onclick="showPage('support',this)">Support</button>
</div>

<div id="overviewPage" class="page active">
  <div class="card">
    <h3>Summary</h3>
    <p id="summaryText"></p>
  </div>
</div>

<div id="analyticsPage" class="page">
  <div class="card">
    <h3>Total Views</h3>
    <h2 id="analyticsTotal">0</h2>
  </div>

  <div class="card">
    <h3>All Visits</h3>
    <div id="visitsList" class="list"></div>
  </div>
</div>

<div id="requestsPage" class="page">

  <div class="card">
    <h3>Submit Request</h3>

    <select id="requestType">
      <option>Text Change</option>
      <option>Image Change</option>
    </select>

    <input id="requestPage" placeholder="Page">
    <textarea id="requestMessage" placeholder="Describe..."></textarea>

    <button onclick="submitChangeRequest()">Submit</button>
    <p id="requestMessageStatus"></p>
  </div>

  <div class="card">
    <h3>Requests</h3>
    <div id="requestsList" class="list"></div>
  </div>

</div>

<div id="supportPage" class="page">

  <div class="card">
    <h3>Support</h3>

    <input id="ticketSubject" placeholder="Subject">
    <textarea id="ticketMessage"></textarea>

    <button onclick="submitSupportTicket()">Submit</button>
  </div>

  <div class="card">
    <div id="supportList"></div>
  </div>

</div>

  <script>
function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));

  document.getElementById(page+'Page').classList.add('active');
  btn.classList.add('active');
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="dashboard.js?v=9999"></script>

</body>
</html>
