<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#eef2f8;
  color:#0f172a;
}

.dashboard{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}

/* SIDEBAR */
.sidebar{
  background:#07111f;
  color:white;
  padding:24px;
}

.sidebar h2{
  margin-bottom:20px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav button{
  background:rgba(255,255,255,.05);
  border:none;
  color:white;
  padding:14px;
  border-radius:12px;
  cursor:pointer;
  text-align:left;
  font-weight:700;
}

.nav button.active,
.nav button:hover{
  background:linear-gradient(135deg,#7B5CFF,#A78BFA);
}

/* MAIN */
.main{
  padding:30px;
}

/* PAGES */
.page{
  display:none;
}

.page.active{
  display:block;
}

/* HERO */
.hero{
  background:#0f172a;
  color:white;
  padding:30px;
  border-radius:20px;
  margin-bottom:20px;
}

.hero h1{
  font-size:32px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.05);
}

/* STATS */
.stat span{
  color:#64748b;
  font-size:12px;
}

.stat strong{
  font-size:28px;
  display:block;
}

/* CHART */
.chart{
  height:200px;
  display:flex;
  align-items:flex-end;
  gap:6px;
}

.bar{
  flex:1;
  background:linear-gradient(180deg,#7B5CFF,#A78BFA);
  border-radius:6px;
  transition:.3s;
}

/* TABLE */
.table{
  margin-top:20px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid #eee;
}

/* BADGE */
.badge{
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.good{background:#dcfce7;color:#166534;}
.warn{background:#fff7ed;color:#9a3412;}
.bad{background:#fee2e2;color:#991b1b;}
</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Dashboard</h2>

  <div class="nav">
    <button class="active" onclick="showPage('overview')">Overview</button>
    <button onclick="showPage('analytics')">Analytics</button>
    <button onclick="showPage('leads')">Leads</button>
    <button onclick="showPage('requests')">Requests</button>
    <button onclick="showPage('billing')">Billing</button>
    <button onclick="showPage('seo')">SEO</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- OVERVIEW -->
<div id="overview" class="page active">

  <div class="hero">
    <h1 id="welcome">Welcome</h1>
    <p id="subtitle">Your website is working</p>
  </div>

  <div class="grid">
    <div class="card stat">
      <span>Views (30 days)</span>
      <strong id="views30">0</strong>
    </div>

    <div class="card stat">
      <span>Views (7 days)</span>
      <strong id="views7">0</strong>
    </div>

    <div class="card stat">
      <span>Leads</span>
      <strong id="leadsCount">0</strong>
    </div>

    <div class="card stat">
      <span>Requests</span>
      <strong id="requestsCount">0</strong>
    </div>
  </div>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="page">

  <h2>Traffic Overview</h2>

  <div class="card">
    <div id="chart" class="chart"></div>
  </div>

</div>

<!-- LEADS -->
<div id="leads" class="page">

  <h2>Your Leads</h2>

  <div id="leadsList" class="table"></div>

</div>

<!-- REQUESTS -->
<div id="requests" class="page">

  <h2>Change Requests</h2>

  <div id="requestsList" class="table"></div>

</div>

<!-- BILLING -->
<div id="billing" class="page">

  <h2>Billing</h2>

  <div class="card">
    <p>Status: <strong id="billingStatus"></strong></p>
    <p>Next Payment: <strong id="nextPayment"></strong></p>
  </div>

</div>

<!-- SEO -->
<div id="seo" class="page">

  <h2>SEO Score</h2>

  <div class="card">
    <strong id="seoScore">0</strong>
  </div>

</div>

</div>
</div>

<script>
function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");

  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="dashboard.js?v=20"></script>

</body>
</html>
