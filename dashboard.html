<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard | Giles Web Design</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#070A12;
  --panel:#0F172A;
  --panel2:#111C33;
  --line:rgba(255,255,255,.08);
  --text:#F8FAFC;
  --muted:#94A3B8;
  --purple:#8B5CF6;
  --purple2:#A78BFA;
}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#070A12,#090D18);
  color:var(--text);
}

.main{
  padding:16px;
  max-width:1200px;
  margin:auto;
}

.hero{
  background:linear-gradient(135deg,#0F172A,#111827);
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  margin-bottom:14px;
}

.hero h1{font-size:26px;}
.hero p{color:var(--muted);margin-top:6px;}

.actions{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;}

.btn{
  padding:10px 14px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:white;
  text-decoration:none;
  font-weight:900;
}

.tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  margin-bottom:14px;
}

.tabs button{
  border:none;
  background:rgba(255,255,255,.05);
  padding:10px 14px;
  border-radius:999px;
  color:white;
  font-weight:900;
}

.tabs button.active{background:var(--purple);}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:14px;
}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
}

.card span{color:var(--muted);font-size:12px;}
.card strong{font-size:22px;display:block;margin-top:6px;}

.list{display:grid;gap:10px;}

.item{
  background:var(--panel2);
  border:1px solid var(--line);
  border-radius:12px;
  padding:12px;
  font-size:13px;
}

.page{display:none;}
.page.active{display:block;}

@media(min-width:700px){
  .grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>

<body>

<div class="main">

<div class="hero">
  <h1 id="welcomeTitle">Dashboard</h1>
  <p id="welcomeSubtitle">Your website performance overview</p>
  <div class="actions">
    <a id="heroLiveBtn" href="#" target="_blank" class="btn">View Website</a>
    <a href="editor.html" class="btn">Open Editor</a>
  </div>
</div>

<div class="tabs">
  <button class="active" onclick="showPage('overview', this)">Overview</button>
  <button onclick="showPage('analytics', this)">Analytics</button>
  <button onclick="showPage('leads', this)">Leads</button>
  <button onclick="showPage('billing', this)">Billing</button>
</div>

<div id="overviewPage" class="page active">
  <div class="grid">
    <div class="card"><span>Views</span><strong id="sumViewsMonth">0</strong></div>
    <div class="card"><span>Leads</span><strong id="sumLeadsMonth">0</strong></div>
    <div class="card"><span>Requests</span><strong id="sumOpenRequests">0</strong></div>
    <div class="card"><span>Support</span><strong id="sumOpenTickets">0</strong></div>
  </div>
  <div class="card">
    <h3>Recent Leads</h3>
    <div id="leadsList" class="list"></div>
  </div>
</div>

<div id="analyticsPage" class="page">
  <div class="grid">
    <div class="card"><span>Total Views</span><strong id="analyticsTotal">0</strong></div>
    <div class="card"><span>7 Day</span><strong id="analyticsWeek">0</strong></div>
    <div class="card"><span>Top Source</span><strong id="analyticsSource">â</strong></div>
    <div class="card"><span>Top Device</span><strong id="analyticsDevice">â</strong></div>
  </div>
  <div class="card">
    <h3>Visits</h3>
    <div id="visitsList" class="list"></div>
  </div>
</div>

<div id="leadsPage" class="page">
  <div class="card">
    <h3>All Leads</h3>
    <div id="fullLeadsList" class="list"></div>
  </div>
</div>

<div id="billingPage" class="page">
  <div class="card">
    <h3>Billing</h3>
    <div id="billingDetails"></div>
  </div>
</div>

</div>

<script>
function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  document.getElementById(page+'Page').classList.add('active');
  btn.classList.add('active');
}
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script src="dashboard.js?v=1100"></script>

</body>
</html>
