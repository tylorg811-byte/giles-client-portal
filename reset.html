<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Password | Giles Client Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f6f7fb;
font-family:Inter,Arial,sans-serif;
}

.card{
width:92%;
max-width:430px;
background:white;
border:1px solid #e6e6ef;
border-radius:22px;
padding:36px;
box-shadow:0 20px 50px rgba(20,20,40,.08);
text-align:center;
}

.logo{
width:58px;
height:58px;
border-radius:16px;
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
font-weight:900;
margin:0 auto 20px;
}

h1{
font-size:24px;
margin-bottom:8px;
}

p{
font-size:14px;
color:#777;
margin-bottom:24px;
line-height:1.5;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #e6e6ef;
margin-bottom:14px;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
color:white;
font-weight:800;
cursor:pointer;
font-size:15px;
}

a{
display:inline-block;
margin-top:18px;
color:#5a4cff;
text-decoration:none;
font-weight:700;
font-size:14px;
}

#message{
margin-top:14px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">G</div>

  <h1>Update Password</h1>
  <p>Enter your new password below.</p>

  <input id="newPassword" type="password" placeholder="New password">
  <input id="confirmPassword" type="password" placeholder="Confirm password">

  <button onclick="updatePassword()">Update Password</button>

  <div id="message"></div>

  <a href="dashboard.html">Back to dashboard</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
