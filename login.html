<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Login | Giles Web Design</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Inter,Arial,sans-serif;
background:#07111f;
overflow:hidden;
}

.bg{
position:fixed;
inset:-40%;
background:linear-gradient(120deg,#07111f,#102a4c,#141b5f,#07111f);
background-size:300% 300%;
animation:moveBg 12s ease infinite;
z-index:-2;
}

.bg::after{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at center,rgba(123,92,255,.32),transparent 45%);
}

@keyframes moveBg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.login-card{
width:92%;
max-width:430px;
padding:38px;
border-radius:24px;
background:rgba(255,255,255,.09);
border:1px solid rgba(255,255,255,.16);
backdrop-filter:blur(20px);
box-shadow:0 25px 70px rgba(0,0,0,.35);
text-align:center;
color:white;
}

.logo{
width:64px;
height:64px;
margin:0 auto 18px;
border-radius:18px;
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:900;
}

h1{font-size:26px;margin-bottom:8px;}
p{color:#c8d0df;margin-bottom:26px;font-size:14px;}

input{
width:100%;
padding:15px;
margin-bottom:14px;
border-radius:14px;
border:1px solid rgba(255,255,255,.18);
background:rgba(5,10,20,.65);
color:white;
font-size:15px;
outline:none;
}

input::placeholder{color:#9aa6ba;}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
color:white;
font-weight:800;
font-size:15px;
cursor:pointer;
box-shadow:0 12px 30px rgba(123,92,255,.32);
}

.forgot{
display:inline-block;
margin-top:18px;
color:#dcd7ff;
text-decoration:none;
font-weight:700;
font-size:14px;
}

#message{
margin-top:14px;
font-size:13px;
color:#d8def0;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="login-card">
  <div class="logo">G</div>

  <h1>Client Portal</h1>
  <p>Log in to manage your website</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <a class="forgot" href="forgot.html">Forgot password?</a>

  <div id="message"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
