<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Login | Giles Web Design</title>

<link rel="stylesheet" href="styles.css">

<style>
body{
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
background:#f6f7fb;
font-family:'Inter', Arial, sans-serif;
}

.login-card{
width:100%;
max-width:420px;
padding:36px;
border-radius:18px;
background:white;
border:1px solid #e6e6ef;
box-shadow:0 20px 50px rgba(0,0,0,.08);
text-align:center;
}

.logo{
width:60px;
height:60px;
margin:0 auto 18px;
border-radius:14px;
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:22px;
font-weight:800;
}

h1{
font-size:22px;
margin-bottom:6px;
}

p{
font-size:14px;
color:#777;
margin-bottom:24px;
}

input{
width:100%;
padding:14px;
margin-bottom:14px;
border-radius:12px;
border:1px solid #e6e6ef;
font-size:14px;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:linear-gradient(135deg,#7B5CFF,#9F7BFF);
color:white;
font-weight:700;
cursor:pointer;
font-size:15px;
}

button:hover{
opacity:.95;
}

#message{
margin-top:14px;
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="login-card">

  <div class="logo">G</div>

  <h1>Client Portal</h1>
  <p>Log in to edit your website</p>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="message"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
